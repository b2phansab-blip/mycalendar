<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS PRO Backtest Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #ffffff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dashboard-card { background-color: #ffffff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; height: 100%; display: flex; flex-direction: column; justify-content: center;}
        .metric-value { font-size: 2rem; font-weight: bold; color: #0d6efd; margin-top: 5px;}
        .road-title { font-size: 0.85rem; font-weight: bold; margin-top: 10px; margin-bottom: 5px; color: #495057; border-bottom: 2px solid #dee2e6; padding-bottom: 3px; }
        .bead-grid { display: grid; grid-template-rows: repeat(6, 30px); grid-auto-flow: column; gap: 2px; overflow-x: auto; padding-bottom: 10px; }
        .bead { width: 30px; height: 30px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .bead-b { background-color: #dc3545; }
        .bead-p { background-color: #0d6efd; }
        .bead-t { background-color: #198754; }
        .road-grid { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 10px; min-height: 40px; }
        .road-col { display: flex; flex-direction: column; gap: 3px; }
        .br-bead { width: 20px; height: 20px; border-radius: 50%; border: 3px solid; display: inline-block; }
        .br-B { border-color: #dc3545; }
        .br-P { border-color: #0d6efd; }
        .drv-bead { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .drv-R { background-color: #dc3545; }
        .drv-B { background-color: #0d6efd; }
        .table-custom th { font-size: 0.85rem; }
        .table-custom td { vertical-align: middle; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <h2 class="mb-4 text-primary">🛡️ AEGIS PRO Backtest Studio</h2>
    
    <div class="row">
        <div class="col-md-3">
            <div class="sidebar">
                <h5 class="text-secondary mb-3">📂 1. Data Hub</h5>
                <div id="dataStatus" class="alert alert-info py-2 mb-2" style="font-size: 0.85rem;">กำลังโหลดข้อมูล...</div>
                <input type="file" id="fileInput" class="form-control form-control-sm mb-4" accept=".txt,.csv" multiple>

                <h5 class="text-secondary mb-3">⚙️ 2. Strategy Builder</h5>
                
                <div class="p-2 mb-3 bg-light border rounded border-primary">
                    <label class="form-label fw-bold text-primary d-block" style="font-size: 0.9rem;">🎯 จังหวะเริ่มสแกน (Entry & Trigger)</label>
                    <select id="startTrigger" class="form-select form-select-sm mb-2" onchange="toggleStartHand()">
                        <option value="CR">รอไม้ขีดเกิด (CR) แล้วสแกน</option>
                        <option value="HAND">ระบุตาที่เริ่มสแกน (Hand No.)</option>
                    </select>
                    <div id="handInputDiv" style="display: none;" class="mb-2">
                        <input type="number" id="startHandNum" class="form-control form-control-sm" value="20" min="5">
                    </div>
                    <div class="pt-2 border-top mb-2">
                        <label class="form-label mb-0" style="font-size: 0.75rem;">บังคับเข้าทำ 'ชุดแรก' ไม่เกินตาที่ <span class="text-muted">(0=ไม่จำกัด)</span>:</label>
                        <input type="number" id="maxEntryHand" class="form-control form-control-sm" value="50" min="0">
                    </div>
                    <div class="pt-2 border-top">
                        <div class="row g-2 align-items-center">
                            <div class="col-8"><label class="form-label mb-0 text-primary fw-bold" style="font-size: 0.75rem;">⚡ เข้าแทงเมื่อสีติดกัน >= (เม็ด):</label></div>
                            <div class="col-4"><input type="number" id="triggerLen" class="form-control form-control-sm text-center" value="2" min="1"></div>
                        </div>
                    </div>
                </div>

                <div class="mb-3 p-2 border rounded bg-white">
                    <label class="form-label fw-bold d-block text-primary" style="font-size: 0.9rem;">เงื่อนไข 1: ต้องมีเสายาว >=</label>
                    <div class="row g-1 text-center fw-bold text-muted mb-1" style="font-size: 0.75rem;">
                        <div class="col-4">เลือกตาราง</div>
                        <div class="col-4">ยาว >=</div>
                        <div class="col-4">มี >= (ต้น)</div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input min-road" type="checkbox" value="BR" id="min_BR" checked><label class="form-check-label" for="min_BR" style="font-size: 0.8rem;">BR</label></div></div>
                        <div class="col-4"><input type="number" id="minStr_BR" class="form-control form-control-sm text-center" value="3" min="1"></div>
                        <div class="col-4"><input type="number" id="minCnt_BR" class="form-control form-control-sm text-center" value="2" min="1"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input min-road" type="checkbox" value="BEB" id="min_BEB" checked><label class="form-check-label" for="min_BEB" style="font-size: 0.8rem;">BEB</label></div></div>
                        <div class="col-4"><input type="number" id="minStr_BEB" class="form-control form-control-sm text-center" value="3" min="1"></div>
                        <div class="col-4"><input type="number" id="minCnt_BEB" class="form-control form-control-sm text-center" value="2" min="1"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input min-road" type="checkbox" value="SR" id="min_SR"><label class="form-check-label" for="min_SR" style="font-size: 0.8rem;">SR</label></div></div>
                        <div class="col-4"><input type="number" id="minStr_SR" class="form-control form-control-sm text-center" value="3" min="1"></div>
                        <div class="col-4"><input type="number" id="minCnt_SR" class="form-control form-control-sm text-center" value="1" min="1"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-2">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input min-road" type="checkbox" value="CR" id="min_CR"><label class="form-check-label" for="min_CR" style="font-size: 0.8rem;">CR</label></div></div>
                        <div class="col-4"><input type="number" id="minStr_CR" class="form-control form-control-sm text-center" value="3" min="1"></div>
                        <div class="col-4"><input type="number" id="minCnt_CR" class="form-control form-control-sm text-center" value="1" min="1"></div>
                    </div>
                    <select id="minConditionType" class="form-select form-select-sm text-primary fw-bold">
                        <option value="AND">🔥 ต้องผ่านทุกตารางที่ติ๊ก (AND)</option>
                        <option value="OR">✅ ผ่านแค่ 1 ตารางที่ติ๊ก (OR)</option>
                    </select>
                </div>

                <div class="mb-3 p-2 border rounded bg-white">
                    <label class="form-label fw-bold d-block text-danger" style="font-size: 0.9rem;">เงื่อนไข 2: ห้ามมีเสายาวเกิน ></label>
                    <div class="row g-1 text-center fw-bold text-muted mb-1" style="font-size: 0.75rem;">
                        <div class="col-4">เลือกตาราง</div>
                        <div class="col-4">ยาว ></div>
                        <div class="col-4">ห้ามมี > (ต้น)</div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input max-road" type="checkbox" value="BR" id="max_BR" checked><label class="form-check-label" for="max_BR" style="font-size: 0.8rem;">BR</label></div></div>
                        <div class="col-4"><input type="number" id="maxStr_BR" class="form-control form-control-sm text-center" value="2" min="1"></div>
                        <div class="col-4"><input type="number" id="maxCnt_BR" class="form-control form-control-sm text-center" value="0" min="0"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input max-road" type="checkbox" value="BEB" id="max_BEB" checked><label class="form-check-label" for="max_BEB" style="font-size: 0.8rem;">BEB</label></div></div>
                        <div class="col-4"><input type="number" id="maxStr_BEB" class="form-control form-control-sm text-center" value="2" min="1"></div>
                        <div class="col-4"><input type="number" id="maxCnt_BEB" class="form-control form-control-sm text-center" value="0" min="0"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input max-road" type="checkbox" value="SR" id="max_SR"><label class="form-check-label" for="max_SR" style="font-size: 0.8rem;">SR</label></div></div>
                        <div class="col-4"><input type="number" id="maxStr_SR" class="form-control form-control-sm text-center" value="4" min="1"></div>
                        <div class="col-4"><input type="number" id="maxCnt_SR" class="form-control form-control-sm text-center" value="0" min="0"></div>
                    </div>
                    <div class="row g-1 align-items-center mb-1">
                        <div class="col-4"><div class="form-check mb-0"><input class="form-check-input max-road" type="checkbox" value="CR" id="max_CR"><label class="form-check-label" for="max_CR" style="font-size: 0.8rem;">CR</label></div></div>
                        <div class="col-4"><input type="number" id="maxStr_CR" class="form-control form-control-sm text-center" value="4" min="1"></div>
                        <div class="col-4"><input type="number" id="maxCnt_CR" class="form-control form-control-sm text-center" value="0" min="0"></div>
                    </div>
                    <select id="maxConditionType" class="form-select form-select-sm text-danger fw-bold mt-2">
                        <option value="AND">🔥 ต้องผ่านทุกตารางที่ติ๊ก (AND)</option>
                        <option value="OR">✅ ผ่านแค่ 1 ตารางที่ติ๊ก (OR)</option>
                    </select>
                </div>

                <div class="p-2 mb-3 bg-light border rounded border-danger">
                    <label class="form-label fw-bold text-danger d-block" style="font-size: 0.9rem;">🛑 จังหวะหยุดเล่น <span class="text-muted" style="font-size: 0.7rem;">(0 = ไม่จำกัด)</span></label>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><label class="form-label mb-0" style="font-size: 0.75rem;">เล่นกี่ชุด (Cycles):</label><input type="number" id="maxCycles" class="form-control form-control-sm" value="0" min="0"></div>
                        <div class="col-6"><label class="form-label mb-0" style="font-size: 0.75rem;">กำไรครบ (TP):</label><input type="number" id="takeProfit" class="form-control form-control-sm" value="0" min="0"></div>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-12">
                            <label class="form-label mb-0" style="font-size: 0.75rem;">ไพ่เกินตาที่ (Stop Hand):</label>
                            <input type="number" id="stopHandNum" class="form-control form-control-sm" value="70" min="0">
                        </div>
                    </div>
                    <div class="row g-2 mb-2 border-top pt-2">
                        <div class="col-12">
                            <label class="form-label mb-0 fw-bold text-warning" style="font-size: 0.75rem;">⏳ เล่นได้ไม่เกิน (ตา) หลังเริ่มไม้ 1:</label>
                            <input type="number" id="maxPlayHands" class="form-control form-control-sm border-warning" value="6" min="0">
                        </div>
                    </div>
                    <div class="form-check mt-1 border-top pt-2">
                        <input class="form-check-input" type="checkbox" id="stopOnBust" checked>
                        <label class="form-check-label fw-bold text-danger" style="font-size: 0.75rem;">พอร์ตแตกปุ๊บ หยุดทันที (เปลี่ยนขอน)</label>
                    </div>
                </div>

                <div class="p-2 mb-4 bg-light border rounded border-success">
                    <label class="form-label fw-bold d-block text-success" style="font-size: 0.9rem;">💰 ระบบเดิมพัน</label>
                    <select id="moneySystem" class="form-select form-select-sm mb-2">
                        <option value="loss">เมื่อผิดแล้วทบ (Martingale)</option>
                        <option value="win">เมื่อถูกแล้วเพิ่ม (Winning Streak)</option>
                    </select>
                    <div class="row g-2 mb-2">
                        <div class="col-4"><label style="font-size: 0.75rem;">รอทิพย์ (VL):</label><input type="number" id="vlLimit" class="form-control form

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat Predict Priority Pro (Fixed Double Confirm)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        button { touch-action: manipulation; }
        .bead-plate-container { display: grid; grid-template-rows: repeat(6, 30px); grid-auto-flow: column; grid-auto-columns: 30px; gap: 1px; background-color: #cbd5e1; border: 1px solid #cbd5e1; padding: 1px; overflow-x: auto; border-radius: 8px; }
        .bead-cell-wrap { background-color: #f8fafc; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .bead-mark { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bead-B { background-color: #ef4444; } .bead-P { background-color: #3b82f6; } .bead-T { background-color: #22c55e; }
        .road-container { min-height: 100px; display: flex; gap: 2px; overflow-x: auto; padding: 4px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; }
        .road-col { display: flex; flex-direction: column; gap: 2px; }
        .br-cell { position: relative; width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; background: white;}
        .br-B { border-color: #ef4444; color: #ef4444; } .br-P { border-color: #3b82f6; color: #3b82f6; }
        .beb-cell { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid; }
        .beb-RED { border-color: #ef4444; } .beb-BLUE { border-color: #3b82f6; }
        .sr-cell { width: 14px; height: 14px; border-radius: 50%; }
        .sr-RED { background-color: #ef4444; } .sr-BLUE { background-color: #3b82f6; }
        .cp-cell { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        .cp-RED { color: #ef4444; } .cp-BLUE { color: #3b82f6; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">

    <div class="max-w-4xl mx-auto space-y-4">

        <div class="bg-white rounded-xl shadow-sm p-3 border border-slate-200">
            <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-slate-500">
                <span id="shoePhaseText">กำลังวิเคราะห์ข้อมูล...</span>
                <span id="shoeHandsText">0 HANDS</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-1.5">
                <div id="shoeProgressBar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="nextBetCard" class="bg-slate-800 rounded-2xl shadow-lg p-5 text-center text-white border-b-4 border-slate-900">
            <div id="confirmBadge" class="hidden inline-block bg-yellow-400 text-slate-900 text-[10px] font-black px-3 py-0.5 rounded-full mb-2 animate-pulse">🔥 DOUBLE CONFIRM</div>
            <div id="nextBetResult" class="text-4xl font-black mb-1 uppercase tracking-tight">WAITING...</div>
            <div id="nextBetReason" class="text-[10px] opacity-50 mb-3">กรุณาระบุสกอร์เพื่อเริ่มคำนวณ</div>
            
            <div class="flex justify-center gap-2">
                <div class="bg-black/30 px-3 py-1 rounded-lg">
                    <div class="text-[8px] opacity-60 uppercase">DC Loss Streak</div>
                    <div id="dcLossCount" class="text-sm font-bold text-green-400">0</div>
                </div>
                <div class="bg-black/30 px-3 py-1 rounded-lg">
                    <div class="text-[8px] opacity-60 uppercase">Priority</div>
                    <div id="activePriority" class="text-sm font-bold text-blue-400">-</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-4 border border-slate-200">
            <div id="scoreDisplay" class="bead-plate-container shadow-inner mb-6"></div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="addScore('P')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-xl shadow-md active:translate-y-1 transition-all text-2xl">P</button>
                <button onclick="addScore('T')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-xl shadow-md active:translate-y-1 transition-all text-2xl">T</button>
                <button onclick="addScore('B')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-5 rounded-xl shadow-md active:translate-y-1 transition-all text-2xl">B</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-4 border-t pt-4">
                <button onclick="undoScore()" class="bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-bold border border-slate-200 uppercase">Back</button>
                <button onclick="clearScore()" class="bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-bold border border-slate-200 uppercase">Clear</button>
                <button onclick="saveShoeToArchive()" class="bg-emerald-50 text-emerald-600 py-2 rounded-lg text-xs font-bold border border-emerald-100 uppercase">Save</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-3 py-2 border-b border-slate-200">
                <span class="text-[10px] font-bold text-slate-500 uppercase">📝 History & Confirmation Radar</span>
            </div>
            <div class="overflow-x-auto max-h-48">
                <table class="w-full text-left text-[10px] md:text-xs border-collapse">
                    <thead class="bg-slate-100 sticky top-0 z-10">
                        <tr class="text-slate-500">
                            <th class="p-2 border-b">No.</th>
                            <th class="p-2 border-b">Priority</th>
                            <th class="p-2 border-b text-center">Confirm</th>
                            <th class="p-2 border-b text-center">Bet</th>
                            <th class="p-2 border-b text-center">Res</th>
                            <th class="p-2 border-b text-center">Stat</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="bg-white p-3 rounded-xl border border-slate-200">
                <div class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Big Road</div>
                <div id="grid-br" class="road-container"></div>
            </div>
            <div class="bg-white p-3 rounded-xl border border-slate-200">
                <div class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Big Eye Boy</div>
                <div id="grid-beb" class="road-container"></div>
            </div>
            <div class="bg-white p-3 rounded-xl border border-slate-200">
                <div class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Small Road</div>
                <div id="grid-sr" class="road-container"></div>
            </div>
            <div class="bg-white p-3 rounded-xl border border-slate-200">
                <div class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Cockroach Pig</div>
                <div id="grid-cp" class="road-container"></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-slate-200 grid grid-cols-3 gap-2 text-center shadow-sm">
            <div><div class="text-[9px] text-slate-400 uppercase">Win</div><div id="winCount" class="text-lg font-bold text-green-600">0</div></div>
            <div><div class="text-[9px] text-slate-400 uppercase">Loss</div><div id="lossCount" class="text-lg font-bold text-red-600">0</div></div>
            <div><div class="text-[9px] text-slate-400 uppercase">Win Rate</div><div id="winRate" class="text-lg font-bold text-blue-600">0%</div></div>
        </div>

    </div>

    <script>
        let globalScore = localStorage.getItem('baccaratScore') || "";
        let shoeArchive = JSON.parse(localStorage.getItem('baccaratArchive') || "[]");

        function addScore(c) { globalScore += c; localStorage.setItem('baccaratScore', globalScore); analyze(); }
        function undoScore() { globalScore = globalScore.slice(0, -1); localStorage.setItem('baccaratScore', globalScore); analyze(); }
        function clearScore() { if(confirm("ล้างขอนปัจจุบัน?")) { globalScore = ""; localStorage.removeItem('baccaratScore'); analyze(); } }

        function calcRoads(pure) {
            let br = []; let cur = [];
            for (let s of pure) { if (cur.length === 0 || cur[0] === s) cur.push(s); else { br.push(cur); cur = [s]; } }
            if (cur.length > 0) br.push(cur);
            
            let getD = (off) => {
                let road = [];
                for (let c = off; c < br.length; c++) {
                    for (let r = 0; r < br[c].length; r++) {
                        if (c === off && r === 0) continue;
                        let col = (r === 0) ? (br[c-1].length === br[c-1-off].length ? 'RED' : 'BLUE') : (br[c-off].length >= r + 1 ? 'RED' : br[c-off].length === r ? 'BLUE' : 'RED');
                        road.push(col);
                    }
                } return road;
            }; return { br, beb: getD(1), sr: getD(2), cp: getD(3) };
        }

        // --- FIXED LOGIC: Correct Double Confirmation ---
        function getAI(pure) {
            if (pure.length < 5) return null;
            let r = calcRoads(pure);
            
            let getLastStreak = (roadData) => {
                if(!roadData || !roadData.length) return null;
                let last = roadData[roadData.length-1]; let n = 0;
                for(let i=roadData.length-1; i>=0; i--){ if(roadData[i]===last) n++; else break; }
                return {c: last, n: n};
            };

            let brS = { c: r.br[r.br.length-1][0], n: r.br[r.br.length-1].length };
            let bebS = getLastStreak(r.beb);
            let srS = getLastStreak(r.sr);
            let cpS = getLastStreak(r.cp);
            
            let pOrder = ['BR','BEB','SR','CP'];
            let sel = null;
            for(let p of pOrder) { 
                let curS = (p==='BR')?brS:(p==='BEB')?bebS:(p==='SR')?srS:cpS;
                if(curS && curS.n >= 2) { sel = {name: p, color: curS.c, n: curS.n}; break; } 
            }
            if (!sel) return null;

            // Determine Target Result (B or P)
            let bet = null;
            if (sel.name === 'BR') {
                bet = sel.color; // ลากสีเดิมของถนนใหญ่
            } else {
                let simB = calcRoads([...pure, 'B']);
                let key = sel.name.toLowerCase();
                if (simB[key][simB[key].length-1] === sel.color) bet = 'B';
                else bet = 'P';
            }

            // Check how many other roads AGREE with this result by continuing their streaks
            let confCount = 0;
            let testResult = (res) => {
                let nR = calcRoads([...pure, res]);
                let matches = 0;
                // Check Big Road
                if (sel.name !== 'BR' && brS.n >= 2 && nR.br[nR.br.length-1][0] === brS.c && nR.br[nR.br.length-1].length > brS.n) matches++;
                // Check Derived Roads
                let dKeys = [{k:'beb', s:bebS}, {k:'sr', s:srS}, {k:'cp', s:cpS}];
                dKeys.forEach(dk => {
                    if (sel.name.toLowerCase() !== dk.k && dk.s && dk.s.n >= 2 && nR[dk.k][nR[dk.k].length-1] === dk.s.c) matches++;
                });
                return matches;
            };

            confCount = testResult(bet);
            return { b: bet, r: sel.name, conf: confCount };
        }

        function analyze() {
            let pure = []; let win=0, loss=0, dcLossStreak = 0;
            let tableH = "";
            for (let i = 0; i < globalScore.length; i++) {
                let c = globalScore[i], adv = getAI(pure), st="-", cls="text-slate-400";
                if(adv && c!=='T'){
                    if(adv.b === c){ 
                        win++; st="WIN"; cls="text-green-600 font-bold";
                        if(adv.conf >= 1) dcLossStreak = 0;
                    } else { 
                        loss++; st="LOSS"; cls="text-red-600 font-bold";
                        if(adv.conf >= 1) dcLossStreak++;
                    }
                }
                let confBadge = adv && adv.conf >= 1 ? `<span class="text-yellow-500 font-bold">✅ +${adv.conf}</span>` : `<span class="text-slate-300">-</span>`;
                let badge = (char) => `<span class="bg-${char==='B'?'red':char==='P'?'blue':'green'}-500 text-white px-2 py-0.5 rounded text-[9px] font-bold inline-block w-6 text-center">${char}</span>`;
                tableH = `<tr class="border-b"><td class="p-2 text-slate-400">${i+1}</td><td class="p-2 font-bold text-slate-700">${adv?adv.r:'-'}</td><td class="p-2 text-center">${confBadge}</td><td class="p-2 text-center">${adv?badge(adv.b):'-'}</td><td class="p-2 text-center">${badge(c)}</td><td class="p-2 text-center ${cls}">${st}</td></tr>` + tableH;
                if(c!=='T') pure.push(c);
            }

            document.getElementById('historyTable').innerHTML = tableH;
            document.getElementById('winCount').innerText = win; document.getElementById('lossCount').innerText = loss;
            document.getElementById('winRate').innerText = (win+loss>0 ? (win/(win+loss)*100).toFixed(0) : 0) + '%';
            document.getElementById('dcLossCount').innerText = dcLossStreak;
            document.getElementById('dcLossCount').className = dcLossStreak >= 2 ? "text-orange-400 font-bold" : "text-green-400 font-bold";

            let l = globalScore.length;
            document.getElementById('shoeHandsText').innerText = l + " HANDS";
            document.getElementById('shoeProgressBar').style.width = Math.min((l/70)*100, 100) + '%';
            let t = document.getElementById('shoePhaseText');
            t.innerText = l < 15 ? "PHASE 1: COLLECTING" : l <= 40 ? "PHASE 2: PRIME TIME" : "PHASE 3: DANGER ZONE";

            let next = getAI(pure);
            let nRes = document.getElementById('nextBetResult'), nRea = document.getElementById('nextBetReason'), cBadge = document.getElementById('confirmBadge'), nPrio = document.getElementById('activePriority');
            if (next) {
                nRes.innerText = next.b==='B'?'BANKER':'PLAYER';
                nRea.innerText = "CONFIRMATION LEVEL: " + next.conf;
                nPrio.innerText = next.r;
                if(next.conf >= 1) cBadge.classList.remove('hidden'); else cBadge.classList.add('hidden');
            } else {
                nRes.innerText = 'WAITING'; nRea.innerText = 'NEED MORE DATA'; nPrio.innerText = '-';
                cBadge.classList.add('hidden');
            }
            renderBeads(); renderRoads(pure);
        }

        function renderBeads() {
            let bp=''; for (let i = 0; i < 72; i++) bp += `<div class="bead-cell-wrap">${globalScore[i]?`<div class="bead-mark bead-${globalScore[i]}">${globalScore[i]}</div>`:''}</div>`;
            document.getElementById('scoreDisplay').innerHTML = bp;
        }

        function renderRoads(pure) {
            let r = calcRoads(pure);
            let draw=(id,data,type)=>{
                let cArr=[];let uArr=[];for(let x of data){if(uArr.length===0||uArr[0]===x)uArr.push(x);else{cArr.push(uArr);uArr=[x]}}if(uArr.length>0)cArr.push(uArr);
                document.getElementById(id).innerHTML=cArr.map(col=>`<div class="road-col">${col.map(s=>{
                    if(type==='beb') return `<div class="beb-cell beb-${s}"></div>`;
                    if(type==='sr') return `<div class="sr-cell sr-${s}"></div>`;
                    if(type==='cp') return `<div class="cp-cell cp-${s}">${s==='RED'?'/':'\\'}</div>`;
                    return `<div class="br-cell br-${s}">${s}</div>`;
                }).join('')}</div>`).join('');
            };
            draw('grid-br', pure, 'br'); draw('grid-beb', r.beb, 'beb'); draw('grid-sr', r.sr, 'sr'); draw('grid-cp', r.cp, 'cp');
        }

        analyze();
    </script>
</body>
</html>

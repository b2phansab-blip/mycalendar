<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat Pro AI V.6 (The Eye of Macao)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .bead-plate-container { display: grid; grid-template-rows: repeat(6, 30px); grid-auto-flow: column; grid-auto-columns: 30px; gap: 1px; background-color: #cbd5e1; border: 1px solid #cbd5e1; padding: 1px; overflow-x: auto; border-radius: 8px; }
        .bead-cell-wrap { background-color: #f8fafc; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .bead-mark { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .bead-B { background-color: #ef4444; } .bead-P { background-color: #3b82f6; } .bead-T { background-color: #22c55e; }
        .road-container { min-height: 100px; display: flex; gap: 4px; overflow-x: auto; padding: 8px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; }
        .road-col { display: flex; flex-direction: column; gap: 4px; }
        .br-cell { position: relative; width: 24px; height: 24px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; background: white;}
        .br-B { border-color: #ef4444; color: #ef4444; } .br-P { border-color: #3b82f6; color: #3b82f6; }
        .beb-cell { width: 16px; height: 16px; border-radius: 50%; border: 2px solid; background: transparent; }
        .beb-RED { border-color: #ef4444; } .beb-BLUE { border-color: #3b82f6; }
        .sr-cell { width: 16px; height: 16px; border-radius: 50%; }
        .sr-RED { background-color: #ef4444; } .sr-BLUE { background-color: #3b82f6; }
        .cp-cell { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .cp-RED { color: #ef4444; } .cp-BLUE { color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen p-2 md:p-6 pb-20">

    <div class="max-w-5xl mx-auto space-y-4">

        <div class="bg-white rounded-2xl shadow-sm p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto">
                <button id="modeOld" onclick="setMode('OLD')" class="flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-slate-800">สายถนนใหญ่ (Old)</button>
                <button id="modeNew" onclick="setMode('NEW')" class="flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500">สายตาไก่ (New)</button>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto justify-center">
                <div class="text-center">
                    <div class="text-[10px] font-bold text-slate-400 uppercase">ขอนปัจจุบัน</div>
                    <div id="shoeNetProfit" class="text-lg font-bold text-slate-700">+0</div>
                </div>
                <div class="h-8 w-px bg-slate-200"></div>
                <div class="text-center">
                    <div class="text-[10px] font-bold text-slate-400 uppercase">สถานะระบบ</div>
                    <div id="systemStatus" class="text-sm font-bold text-blue-600">รอผิด 2</div>
                </div>
            </div>
        </div>

        <div id="aiRecommendationCard"></div>

        <div class="bg-white rounded-2xl shadow-md p-4 md:p-6 text-center">
            <div id="scoreDisplay" class="bead-plate-container shadow-inner mb-6"></div>

            <div class="grid grid-cols-3 gap-2 md:gap-4">
                <button onclick="addScore('P')" class="touch-manipulation bg-blue-500 text-white font-bold py-5 rounded-xl shadow-[0_4px_0_rgb(29,78,216)] active:translate-y-1 text-2xl">P</button>
                <button onclick="addScore('T')" class="touch-manipulation bg-green-500 text-white font-bold py-5 rounded-xl shadow-[0_4px_0_rgb(21,128,61)] active:translate-y-1 text-2xl">T</button>
                <button onclick="addScore('B')" class="touch-manipulation bg-red-500 text-white font-bold py-5 rounded-xl shadow-[0_4px_0_rgb(185,28,28)] active:translate-y-1 text-2xl">B</button>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="undoScore()" class="bg-slate-500 text-white font-bold py-3 rounded-xl shadow">⬅️ ย้อนกลับ</button>
                <button onclick="clearScore()" class="bg-slate-800 text-white font-bold py-3 rounded-xl shadow">🔄 ล้างขอน</button>
            </div>
        </div>

        <div id="nextBetCard" class="bg-slate-800 rounded-3xl shadow-xl p-8 text-center text-white transition-all duration-300">
            <div id="waitSignal" class="hidden flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4"></div>
                <div class="text-xl font-bold">กำลังรอให้ระบบ "ทายผิด" ให้ครบ 2 ครั้ง</div>
                <div id="virtualLossCounter" class="text-4xl font-black mt-2 text-yellow-400">0 / 2</div>
            </div>
            <div id="betSignal" class="block">
                <h2 class="text-lg text-white/60 font-bold mb-1 uppercase tracking-widest">คำทำนายตาต่อไป</h2>
                <div id="nextBetResult" class="text-5xl md:text-7xl font-black mb-4">รอสถิติ...</div>
                <div class="flex justify-center gap-4 items-center">
                    <div id="betStepBadge" class="bg-yellow-400 text-slate-900 px-4 py-1 rounded-full font-bold text-sm">ไม้ 1</div>
                    <div id="betAmountBadge" class="text-2xl font-bold">100 หน่วย</div>
                </div>
                <div id="nextBetReason" class="mt-4 text-white/50 text-xs italic"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><div class="text-[10px] font-bold text-slate-400 mb-1">1. ถนนใหญ่ (BIG ROAD)</div><div id="grid-br" class="road-container"></div></div>
                <div><div class="text-[10px] font-bold text-slate-400 mb-1">2. ตาไก่ (BIG EYE BOY)</div><div id="grid-beb" class="road-container"></div></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="p-4 bg-slate-100 font-bold text-slate-600 flex justify-between">
                <span>📝 บันทึกการเดินเงิน (15-45)</span>
                <span id="totalHandsText">0 ตา</span>
            </div>
            <div class="overflow-x-auto max-h-64">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase">
                        <tr>
                            <th class="p-3">ตาที่</th>
                            <th class="p-3">AI สั่ง</th>
                            <th class="p-3">เราลงเงิน</th>
                            <th class="p-3">ผลลัพธ์</th>
                            <th class="p-3">กำไรขอน</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let globalScore = localStorage.getItem('baccaratScore') || "";
        let currentMode = localStorage.getItem('baccaratMode') || "OLD"; // OLD: BR > BEB, NEW: BEB > BR
        
        // สถานะการเล่น
        let virtualLosses = 0;
        let currentStep = 0; // 0=Wait, 1,2,3,4=Betting
        let shoeProfit = 0;

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem('baccaratMode', mode);
            document.getElementById('modeOld').className = mode === 'OLD' ? "flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-slate-800" : "flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500";
            document.getElementById('modeNew').className = mode === 'NEW' ? "flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-slate-800" : "flex-1 px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500";
            analyze();
        }

        function addScore(char) { globalScore += char; localStorage.setItem('baccaratScore', globalScore); analyze(); }
        function undoScore() { if (globalScore.length > 0) { globalScore = globalScore.slice(0, -1); localStorage.setItem('baccaratScore', globalScore); analyze(); } }
        function clearScore() { if(confirm("ล้างข้อมูลขอนปัจจุบัน?")) { globalScore = ""; localStorage.removeItem('baccaratScore'); analyze(); } }

        function calculateRoads(pureScore) {
            let br = []; let currentCol = [];
            for (let s of pureScore) {
                if (currentCol.length === 0 || currentCol[0] === s) currentCol.push(s);
                else { br.push(currentCol); currentCol = [s]; }
            }
            if (currentCol.length > 0) br.push(currentCol);

            let getDerived = (offset) => {
                let road = [];
                for (let c = offset; c < br.length; c++) {
                    for (let r = 0; r < br[c].length; r++) {
                        if (c === offset && r === 0) continue;
                        let color = '';
                        if (r === 0) color = br[c-1].length === br[c-1-offset].length ? 'RED' : 'BLUE';
                        else color = br[c-offset].length >= r + 1 ? 'RED' : br[c-offset].length === r ? 'BLUE' : 'RED';
                        road.push(color);
                    }
                }
                return road;
            };
            return { br, beb: getDerived(1), sr: getDerived(2), cp: getDerived(3) };
        }

        function getStreak(flatRoad) {
            if (!flatRoad || flatRoad.length === 0) return { color: null, len: 0 };
            let last = flatRoad[flatRoad.length-1]; let count = 0;
            for (let i = flatRoad.length-1; i >= 0; i--) { if (flatRoad[i] === last) count++; else break; }
            return { color: last, len: count };
        }

        function getAIAdvice(pureScore) {
            let r = calculateRoads(pureScore);
            if (r.beb.length === 0) return null;

            let brStreak = { color: r.br[r.br.length-1][0], len: r.br[r.br.length-1].length };
            let bebStreak = getStreak(r.beb);

            let priority = currentMode === 'OLD' ? ['BR', 'BEB'] : ['BEB', 'BR'];
            let sel = null;

            for (let p of priority) {
                if (p === 'BR' && brStreak.len >= 2) { sel = { road: 'BR', color: brStreak.color, len: brStreak.len }; break; }
                if (p === 'BEB' && bebStreak.len >= 2) { sel = { road: 'BEB', color: bebStreak.color, len: bebStreak.len }; break; }
            }

            if (!sel) return null;

            let simulate = (char) => {
                let s = calculateRoads([...pureScore, char]);
                if (sel.road === 'BR') return s.br[s.br.length-1].length > sel.len && s.br[s.br.length-1][0] === sel.color;
                let s_beb_streak = getStreak(s.beb);
                return s_beb_streak.color === sel.color;
            };

            if (simulate('B')) return { bet: 'B', reason: `ลาก ${sel.road}` };
            if (simulate('P')) return { bet: 'P', reason: `ลาก ${sel.road}` };
            return null;
        }

        function analyze() {
            let pureHistory = []; let tableHTML = '';
            virtualLosses = 0; currentStep = 0; shoeProfit = 0;
            let stopWin = false;

            for (let i = 0; i < globalScore.length; i++) {
                let char = globalScore[i];
                let handIdx = i + 1;
                let advice = getAIAdvice(pureHistory);
                let rowBet = "-"; let rowResult = "-"; let rowStatus = "";

                if (advice && char !== 'T') {
                    // Logic: Sniper Wait 2 + Martingale 4
                    if (currentStep === 0 && !stopWin) {
                        if (char === advice.bet) virtualLosses = 0;
                        else {
                            virtualLosses++;
                            if (virtualLosses === 2 && handIdx >= 15 && handIdx <= 45) currentStep = 1;
                        }
                    } else if (currentStep > 0 && !stopWin) {
                        let units = [0, 1, 3, 7, 15][currentStep];
                        rowBet = `${advice.bet} (${units})`;
                        if (char === advice.bet) {
                            shoeProfit += units; rowResult = "WIN"; rowStatus = "text-green-600 font-bold";
                            currentStep = 1; // "ปล่อยไหล" ไม้ 1 ต่อตามที่ต้องการ
                            virtualLosses = 0;
                            if (shoeProfit >= 10) stopWin = true;
                        } else {
                            shoeProfit -= units; rowResult = "LOSE"; rowStatus = "text-red-600 font-bold";
                            currentStep++;
                            if (currentStep > 4) { currentStep = 0; virtualLosses = 0; } // แตก กลับไปรอใหม่
                        }
                    }
                }
                
                if (handIdx >= 15) {
                    tableHTML = `<tr class="border-b">
                        <td class="p-3 text-slate-400">${handIdx}</td>
                        <td class="p-3 font-bold">${advice ? advice.bet : '-'}</td>
                        <td class="p-3">${rowBet}</td>
                        <td class="p-3 ${rowStatus}">${rowResult}</td>
                        <td class="p-3 font-bold ${shoeProfit>=0?'text-green-600':'text-red-600'}">${shoeProfit}</td>
                    </tr>` + tableHTML;
                }

                if (char !== 'T') pureHistory.push(char);
            }

            // Update UI
            document.getElementById('historyTable').innerHTML = tableHTML || '<tr><td colspan="5" class="p-8 text-center text-slate-400 italic">ระบบเริ่มบันทึกตาที่ 15 เป็นต้นไป</td></tr>';
            document.getElementById('shoeNetProfit').innerText = (shoeProfit >= 0 ? '+' : '') + shoeProfit;
            document.getElementById('shoeNetProfit').className = `text-lg font-bold ${shoeProfit >= 0 ? 'text-green-600' : 'text-red-600'}`;
            document.getElementById('totalHandsText').innerText = `${globalScore.length} ตา`;
            
            // Next Prediction
            let nextAdvice = getAIAdvice(pureHistory);
            let waitDiv = document.getElementById('waitSignal');
            let betDiv = document.getElementById('betSignal');
            let nextResult = document.getElementById('nextBetResult');
            let nextReason = document.getElementById('nextBetReason');
            let card = document.getElementById('nextBetCard');

            if (stopWin || globalScore.length > 45) {
                waitDiv.classList.add('hidden'); betDiv.classList.remove('hidden');
                nextResult.innerText = stopWin ? "🎯 GO HOME" : "🛑 STOP";
                nextReason.innerText = stopWin ? "กำไรครบเป้า +10 แล้ว ลุกหนีทันที!" : "เกินตาที่ 45 แล้ว อันตรายเกินไป เลิกเล่นครับ";
                card.className = "bg-green-600 rounded-3xl shadow-xl p-8 text-center text-white";
                document.getElementById('systemStatus').innerText = "ปิดรอบ";
            } else if (nextAdvice) {
                if (currentStep === 0) {
                    waitDiv.classList.remove('hidden'); betDiv.classList.add('hidden');
                    document.getElementById('virtualLossCounter').innerText = `${virtualLosses} / 2`;
                    card.className = "bg-slate-800 rounded-3xl shadow-xl p-8 text-center text-white";
                    document.getElementById('systemStatus').innerText = "รอผิด 2";
                } else {
                    waitDiv.classList.add('hidden'); betDiv.classList.remove('hidden');
                    nextResult.innerText = nextAdvice.bet === 'B' ? 'BANKER' : 'PLAYER';
                    nextReason.innerText = nextAdvice.reason;
                    document.getElementById('betStepBadge').innerText = `ไม้ ${currentStep}`;
                    document.getElementById('betAmountBadge').innerText = `${[0, 1, 3, 7, 15][currentStep]} หน่วย`;
                    card.className = nextAdvice.bet === 'B' ? "bg-red-600 rounded-3xl shadow-xl p-8 text-center text-white" : "bg-blue-600 rounded-3xl shadow-xl p-8 text-center text-white";
                    document.getElementById('systemStatus').innerText = "ลุย!";
                }
            } else {
                waitDiv.classList.add('hidden'); betDiv.classList.remove('hidden');
                nextResult.innerText = "รอสถิติ"; nextReason.innerText = "ตารางยังไม่เกิดเค้าไพ่ที่ต้องการ";
                card.className = "bg-slate-800 rounded-3xl shadow-xl p-8 text-center text-white";
                document.getElementById('systemStatus').innerText = "เตรียมตัว";
            }

            renderRoads(globalScore);
        }

        function renderRoads(inputStr) {
            let bpHTML = ''; let totalCells = Math.max(inputStr.length, 60); if (totalCells % 6 !== 0) totalCells += (6 - (totalCells % 6));
            for (let i = 0; i < totalCells; i++) {
                let char = inputStr[i];
                bpHTML += `<div class="bead-cell-wrap">${char?`<div class="bead-mark bead-${char}">${char}</div>`:''}</div>`;
            }
            document.getElementById('scoreDisplay').innerHTML = bpHTML;

            let pure = inputStr.replace(/T/g, '').split('');
            let r = calculateRoads(pure);
            
            let renderCol = (cols, cellFn) => cols.map(col => `<div class="road-col">${col.map(cellFn).join('')}</div>`).join('');
            
            // Render Big Road (with Tie logic)
            let brData = []; let cur = [];
            for(let s of inputStr){
                if(s==='T'){ if(cur.length>0) cur[cur.length-1].t=(cur[cur.length-1].t||0)+1; }
                else { if(cur.length===0 || cur[0].s===s) cur.push({s}); else { brData.push(cur); cur=[{s}]; } }
            }
            if(cur.length>0) brData.push(cur);
            document.getElementById('grid-br').innerHTML = renderCol(brData, c => `<div class="br-cell br-${c.s}">${c.t?`<div class="absolute inset-0 flex items-center justify-center"><div class="w-full h-[2px] bg-green-500 -rotate-45"></div><span class="absolute top-0 right-0 text-[8px] text-green-600 font-bold">${c.t>1?c.t:''}</span></div>`:''}</div>`);
            
            // Render BEB
            let bebCols = []; let curB = [];
            for(let s of r.beb) { if(curB.length===0 || curB[0]===s) curB.push(s); else { bebCols.push(curB); curB=[s]; } }
            if(curB.length>0) bebCols.push(curB);
            document.getElementById('grid-beb').innerHTML = renderCol(bebCols, s => `<div class="beb-cell beb-${s}"></div>`);
        }

        analyze();
    </script>
</body>
</html>
